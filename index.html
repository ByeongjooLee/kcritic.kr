<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국 비평사 온톨로지</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/gh/TEIC/CETEIcean@master/CETEI.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-title">한국 비평사 온톨로지</a>
      <nav class="site-nav">
        <a href="#">비평글</a>
        <a href="#">비평가</a>
        <a href="#">이론가</a>
        <a href="#">그래프</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <aside class="essay-list">
      <h2>비평글 목록</h2>
      <ul>
        <li><a href="?essay=kim-uchang_yun-dongju_1985" class="active">김우창 — 윤동주의 시와 근대적 자아 (1985)</a></li>
        <li class="muted">새 비평글을 essays/ 폴더에 추가하면 여기 자동으로 나옵니다</li>
      </ul>
    </aside>

    <article id="tei-viewer">
      <p class="loading">비평글을 불러오는 중...</p>
    </article>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p>이 사이트는 <a href="https://tei-c.org">TEI</a> 표준과 <a href="https://github.com/TEIC/CETEIcean">CETEIcean</a>으로 렌더링됩니다.</p>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const essayId = params.get('essay') || 'kim-uchang_yun-dongju_1985';
    const xmlPath = `essays/${essayId}.xml`;

    const c = new CETEI();

    c.addBehaviors({
      "tei": {
        "persName": function(elt) {
          const ref = elt.getAttribute("ref");
          if (ref && ref.startsWith("http")) {
            elt.setAttribute("title", `참조: ${ref}`);
            elt.style.cursor = "help";
          }
        },
        "title": function(elt) {
          const ref = elt.getAttribute("ref");
          if (ref && ref.startsWith("http")) {
            elt.setAttribute("title", `참조: ${ref}`);
          }
        }
      }
    });

    c.getHTML5(xmlPath, function(data) {
      const viewer = document.getElementById("tei-viewer");
      viewer.innerHTML = "";
      viewer.appendChild(data);
    });

    window.addEventListener("error", function(e) {
      const viewer = document.getElementById("tei-viewer");
      if (viewer.querySelector(".loading")) {
        viewer.innerHTML = `
          <div class="error">
            <h2>TEI 파일을 불러올 수 없습니다</h2>
            <p>로컬에서 보고 계시면 VS Code의 <strong>Live Server</strong> 확장을 사용해주세요. file:// 프로토콜에서는 XML 파일 접근이 차단됩니다.</p>
            <p>경로: <code>${xmlPath}</code></p>
          </div>
        `;
      }
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 — 한국 비평사 온톨로지</title>
  <!-- 자체 완결형: 어떤 경로에서 서빙되어도 스타일이 깨지지 않도록 인라인 스타일 + 절대경로 -->
  <style>
    :root { --bg:#f7f5ef; --text:#2b2926; --muted:#8a857c; --accent:#c9986a; --line:#e6e4dc; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .code { font-size: 5rem; font-weight: 700; color: var(--accent); line-height: 1; margin: 0; }
    h1 { font-size: 1.5rem; margin: 1.25rem 0 0.5rem; }
    p { color: var(--muted); margin: 0.25rem 0; line-height: 1.6; }
    .links { margin-top: 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    a.btn {
      display: inline-block; padding: 0.6rem 1.2rem; border: 1px solid var(--line);
      border-radius: 8px; text-decoration: none; color: var(--text); background: #fff;
      font-size: 0.95rem; transition: border-color 0.15s;
    }
    a.btn:hover { border-color: var(--accent); }
    a.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .brand { margin-top: 2.5rem; font-size: 0.85rem; color: var(--muted); }
    .brand a { color: var(--muted); }
  </style>
</head>
<body>
  <p class="code">404</p>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청하신 주소의 페이지가 없거나 이동되었습니다.</p>
  <p>비평글·비평가·작가 페이지는 목록에서 다시 찾아보실 수 있습니다.</p>
  <div class="links">
    <a class="btn btn-primary" href="/index.html">비평글 목록</a>
    <a class="btn" href="/critics.html">비평가</a>
    <a class="btn" href="/writers.html">작가</a>
    <a class="btn" href="/site/graph.html">관계망</a>
  </div>
  <p class="brand"><a href="/">한국 비평사 온톨로지</a></p>
</body>
</html>

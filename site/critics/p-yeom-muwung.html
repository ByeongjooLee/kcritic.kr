<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../../index.html" class="site-title">한국 비평사 온톨로지</a>
      <nav class="site-nav">
        <a href="../../index.html">비평글</a>

      </nav>
    </div>

  <main class="container index-main">
    <section class="critic-profile-hero">
      <div class="critic-profile-byline"><span class="chip role-critic">염무웅</span></div>
      <h1 class="index-heading">염무웅</h1>
      <div class="stat-row">
        <div class="stat"><span class="stat-num">1</span><span class="stat-label">수록 비평글</span></div>
        <div class="stat"><span class="stat-num">0</span><span class="stat-label">비평 대상 작가</span></div>
        <div class="stat"><span class="stat-num">0</span><span class="stat-label">활용 이론가</span></div>
      </div>
    </section>

    <section class="critic-profile-meta">
      <div class="meta-section">
        <h2 class="meta-label">주요 비평 대상</h2>
        <div class="chip-group"><span class="muted">—</span></div>
      </div>
      <div class="meta-section">
        <h2 class="meta-label">자주 활용한 이론가</h2>
        <div class="chip-group"><span class="muted">—</span></div>
      </div>
    </section>
    
    <section class="critic-mini-graph-section">
      <h2 class="section-label">관계망</h2>
      <div id="critic-mini-graph" class="critic-mini-graph"></div>
      <div class="mini-graph-legend">
        <span class="mini-legend-item"><span class="mini-dot dot-critic"></span>비평가</span>
        <span class="mini-legend-item"><span class="mini-dot dot-essay"></span>비평글</span>
        <span class="mini-legend-item"><span class="mini-dot dot-writer"></span>작가</span>
        <span class="mini-legend-item"><span class="mini-dot dot-theorist"></span>이론가</span>
      </div>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script>
    (function() {
      var graphData = {"nodes": [{"id": "kim-uchang_lee-mungoo-rural_1981", "label": "근대화 속의 농촌 — 이문구의 농촌 소설", "type": "essay", "year": "", "degree": 6}, {"id": "p-yeom-muwung", "label": "염무웅", "type": "critic", "ref": "", "degree": 1}, {"id": "concept-근대화", "label": "근대화", "type": "concept", "degree": 1}, {"id": "concept-하향식", "label": "하향식", "type": "concept", "degree": 1}, {"id": "concept-소비의-일방적인-항진", "label": "소비의 일방적인 항진", "type": "concept", "degree": 1}, {"id": "concept-사실의-확인---분노의-대결과-투쟁---화해---새로운-주체성의-성립", "label": "사실의 확인 → 분노의 대결과 투쟁 → 화해 → 새로운 주체성의 성립", "type": "concept", "degree": 1}, {"id": "concept-자율적-농촌-공동체", "label": "자율적 농촌 공동체", "type": "concept", "degree": 1}], "edges": [{"source": "p-yeom-muwung", "target": "kim-uchang_lee-mungoo-rural_1981", "type": "wrote", "weight": 1}, {"source": "kim-uchang_lee-mungoo-rural_1981", "target": "concept-근대화", "type": "uses_concept", "weight": 1}, {"source": "kim-uchang_lee-mungoo-rural_1981", "target": "concept-하향식", "type": "uses_concept", "weight": 1}, {"source": "kim-uchang_lee-mungoo-rural_1981", "target": "concept-소비의-일방적인-항진", "type": "uses_concept", "weight": 1}, {"source": "kim-uchang_lee-mungoo-rural_1981", "target": "concept-사실의-확인---분노의-대결과-투쟁---화해---새로운-주체성의-성립", "type": "uses_concept", "weight": 1}, {"source": "kim-uchang_lee-mungoo-rural_1981", "target": "concept-자율적-농촌-공동체", "type": "uses_concept", "weight": 1}]};
      var elements = [];
      graphData.nodes.forEach(function(n) {
        elements.push({ data: { id: n.id, label: n.label, type: n.type, degree: n.degree || 1 } });
      });
      graphData.edges.forEach(function(e) {
        elements.push({ data: { source: e.source, target: e.target, type: e.type, weight: e.weight || 1 } });
      });

      var TYPE_COLOR = {
        critic: '#c9986a',
        writer: '#6a9bc9',
        theorist: '#9a7ac9',
        essay: '#c8c8a8'
      };
      var TYPE_TEXT_COLOR = {
        critic: '#4a2400',
        writer: '#0e2d4a',
        theorist: '#2d1050',
        essay: '#3a3a2a'
      };

      var cy = cytoscape({
        container: document.getElementById('critic-mini-graph'),
        elements: elements,
        style: [
          {
            selector: 'node',
            style: {
              'background-color': function(ele) { return TYPE_COLOR[ele.data('type')] || '#aaa'; },
              'label': 'data(label)',
              'font-family': 'Pretendard, sans-serif',
              'font-size': function(ele) { return ele.data('type') === 'essay' ? '10px' : '12px'; },
              'color': function(ele) { return TYPE_TEXT_COLOR[ele.data('type')] || '#333'; },
              'text-valign': 'bottom',
              'text-halign': 'center',
              'text-margin-y': '4px',
              'text-wrap': 'wrap',
              'text-max-width': '90px',
              'width': function(ele) {
                if (ele.data('type') === 'essay') return 60;
                var d = ele.data('degree') || 1;
                return Math.min(Math.max(40 + d * 6, 40), 90);
              },
              'height': function(ele) {
                if (ele.data('type') === 'essay') return 30;
                var d = ele.data('degree') || 1;
                return Math.min(Math.max(40 + d * 6, 40), 90);
              },
              'shape': function(ele) { return ele.data('type') === 'essay' ? 'round-rectangle' : 'ellipse'; },
              'border-width': 1.5,
              'border-color': 'rgba(0,0,0,0.15)',
              'transition-property': 'opacity',
              'transition-duration': '0.15s',
            }
          },
          {
            selector: 'edge',
            style: {
              'width': function(ele) { return Math.min(Math.max((ele.data('weight') || 1) * 1.5, 1.5), 5); },
              'line-color': '#c9c7bf',
              'target-arrow-color': '#c9c7bf',
              'target-arrow-shape': 'triangle',
              'curve-style': 'bezier',
              'opacity': 0.7,
            }
          },
          {
            selector: 'node.faded',
            style: { 'opacity': 0.15 }
          },
          {
            selector: 'edge.faded',
            style: { 'opacity': 0.05 }
          },
          {
            selector: 'node.highlighted',
            style: { 'border-width': 3, 'border-color': '#6b3e26' }
          }
        ],
        layout: {
          name: 'cose',
          animate: false,
          randomize: false,
          nodeRepulsion: 8000,
          idealEdgeLength: 100,
          edgeElasticity: 200,
          gravity: 0.8,
          numIter: 1000,
        },
        userZoomingEnabled: true,
        userPanningEnabled: true,
        boxSelectionEnabled: false,
      });

      // hover 강조
      cy.on('mouseover', 'node', function(e) {
        var node = e.target;
        cy.elements().addClass('faded');
        node.removeClass('faded').addClass('highlighted');
        node.neighborhood().removeClass('faded');
      });
      cy.on('mouseout', 'node', function() {
        cy.elements().removeClass('faded highlighted');
      });
    })();
    </script>
    <section class="essay-grid">
      <h2 class="section-label">수록 비평글 (1편)</h2>
      
      <article class="essay-card">
        <div class="essay-card-meta">
          <span class="essay-card-year"></span>
        </div>
        <h3 class="essay-card-title">
          <a href="../essays/kim-uchang_lee-mungoo-rural_1981.html">근대화 속의 농촌 — 이문구의 농촌 소설</a>
        </h3>
        <p class="essay-card-source"></p>
        <div class="essay-card-tags"></div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>비평 온톨로지 프로젝트 · TEI XML 기반 디지털 아카이브</p>

</body>
</html>
